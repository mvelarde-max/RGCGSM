<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Retiro</title>
    <link rel="stylesheet" href="../../CSS/Diseño1.css">
    <style>
        .contenido {
            max-width: 700px;
            text-align: center;
        }

        .pagina {
            display: none;
            animation: fade .5s;
        }

        .pagina.activa {
            display: block;
        }

        @keyframes fade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Flechas más chicas */
        .flechas {
            margin-top: 15px;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
        }

        .flechas span {
            padding: 5px 10px;
            background: rgba(0,224,255,.2);
            border-radius: 8px;
            cursor: pointer;
        }

        h2 {
            color: #00e0ff;
        }
    </style>
</head>

<body>
    <div class="contenedor">
        <div class="lado">
            <p>CRONOLOGÍA</p>

            <div class="flechas">
                <span onclick="anterior()">⬅</span>
                <span onclick="siguiente()">➡</span>
            </div>

            <button onclick="window.location.href='cronologia.html'">Volver</button>
        </div>

        <div class="centro">
            <div class="contenido">

                <div class="pagina activa">
                    <h2>El Cuartel de Retiro</h2>
                    <h3>Su primer cuartel</h3>
                    <p>Texto histórico...</p>
                </div>

                <div class="pagina">
                    <h3>El cuartel de Retiro</h3>
                    <p>Texto histórico...</p>
                </div>

                <div class="pagina">
                    <h3>Últimos años del cuartel</h3>
                    <p>Texto histórico...</p>
                </div>

            </div>
        </div>
    </div>

    <script>
        let pagina = 0;
        const paginas = document.querySelectorAll(".pagina");

        function mostrarPagina(i){
            paginas.forEach(p => p.classList.remove("activa"));
            paginas[i].classList.add("activa");
        }

        function siguiente(){
            if(pagina < paginas.length - 1){
                pagina++;
                mostrarPagina(pagina);
            } else {
                window.location.href = "creacion.html";
            }
        }

        function anterior(){
            if(pagina > 0){
                pagina--;
                mostrarPagina(pagina);
            }
        }
    </script>

</body>
</html>
