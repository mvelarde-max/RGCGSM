<!DOCTYPE html>

    <link rel="stylesheet" href="../../CSS/Diseño1.css">
    <style>
        /* Contenedor del triángulo */
        .triangulo {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
        }

        .fila-triangulo {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .fila-triangulo .opcion img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 224, 255, 0.6);
            cursor: pointer;
            transition: transform 0.4s;
        }

        .fila-triangulo .opcion:hover img {
            transform: scale(1.2) rotateY(360deg);
        }

        .fila-triangulo .opcion p {
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
