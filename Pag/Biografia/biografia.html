    <style>
        .biografia-contenedor {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
        }

        .fila {
            display: flex;
            justify-content: center;
            gap: 60px;
        }

        .personaje {
            text-align: center;
            text-decoration: none;
            color: #00e0ff;
            transition: 0.3s;
        }

        .personaje img {
            width: 120px;
            height: 120px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 0 0 10px rgba(0,224,255,0.6);
            transition: transform 0.5s;
        }

        .personaje:hover {
            transform: scale(1.1);
            text-shadow: 0 0 10px #00e0ff;
        }

        .personaje:hover img {
            transform: rotateY(360deg) scale(1.2);
        }

        .personaje p {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
