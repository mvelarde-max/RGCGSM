<!DOCTYPE html>

    <link rel="stylesheet" href="../../CSS/biografia.css">

    <style>
        /* Contenedor principal */
        .biografia-contenedor {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 40px;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Cada fila de personajes */
        .fila {
            display: flex;
            justify-content: space-around; /* distribuye equitativamente */
            flex-wrap: wrap; /* baja elementos si no caben */
            gap: 20px;
            width: 100%;
        }

        /* Cada personaje */
        .personaje {
            text-align: center;
            color: #00e0ff;
            text-decoration: none;
            flex: 1 1 120px; /* crece y se reduce según espacio */
            max-width: 150px;
        }

        /* Imagen del personaje */
        .personaje img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 0 0 10px rgba(0,224,255,0.6);
            transition: transform 0.5s;
        }

        /* Hover de personaje */
        .personaje:hover {
            transform: scale(1.1);
            text-shadow: 0 0 10px #00e0ff;
        }

        .personaje:hover img {
            transform: rotateY(360deg) scale(1.2);
        }

        /* Nombre debajo de la imagen */
        .personaje p {
            margin-top: 8px;
            font-size: 14px;
        }

        /* Pantallas pequeñas */
        @media (max-width: 600px) {
            .fila {
                justify-content: center;
            }
            .personaje {
                max-width: 100px;
                flex: 1 1 80px;
            }
            .personaje p {
                font-size: 12px;
            }
        }
    </style>
</head>
